<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=393, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Newsreel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — Change these to update everywhere
   ═══════════════════════════════════════════════ */
:root {
  --nr-red: #FF6343;
  --nr-yellow: #EDBD1F;
  --nr-pink: #FF3377;
  --nr-purple: #C566FF;
  --nr-periwinkle: #9081FF;
  --nr-blue: #1264F2;
  --nr-teal: #00BDB3;
  --nr-green: #1AAD17;
  --nr-black: #000000;
  --nr-charcoal: #0F0F0F;
  --nr-lead: #1F1F1F;
  --nr-iron: #3A3A3A;
  --nr-steel: #6B6B6B;
  --nr-ash: #898989;
  --nr-silver: #ADADAD;
  --nr-smoke: #C8C8C8;
  --nr-paper: #F0F0F0;
  --nr-white: #FFFFFF;
  --font-headline: 'Bree Serif', serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --radius-sm: 6px;
  --radius: 8px;
  --safe-top: 47px;
  --safe-bottom: 34px;
  --nav-h: 83px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  font-family: var(--font-body);
  background: var(--nr-black);
  color: var(--nr-white);
  width: 393px;
  height: 852px;
  overflow: hidden;
  position: relative;
  margin: 0 auto;
}
@media (min-width:500px) {
  body { border-radius:44px; margin-top:16px; border:1px solid var(--nr-iron); box-shadow:0 0 60px rgba(255,99,67,0.06); overflow:hidden; }
}

/* ═══════════════════════════════════════════════
   STATUS BAR
   ═══════════════════════════════════════════════ */
.statusbar {
  position:fixed; top:0; left:50%; transform:translateX(-50%); width:393px; height:var(--safe-top);
  display:flex; align-items:flex-end; justify-content:space-between; padding:0 28px 10px;
  font-size:16px; font-weight:600; z-index:999; pointer-events:none;
}
.statusbar-icons { display:flex; gap:5px; align-items:center; }

/* ═══════════════════════════════════════════════
   BOTTOM NAV
   ═══════════════════════════════════════════════ */
.bottomnav {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:393px; height:var(--nav-h);
  background:var(--nr-black); border-top:1px solid rgba(255,255,255,0.05);
  display:flex; align-items:flex-start; justify-content:space-around; padding-top:10px; z-index:998;
}
.navbtn { display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; padding:4px 16px; transition:transform 0.1s ease-out; -webkit-tap-highlight-color:transparent; }
.navbtn:active { transform:scale(0.9); }
.navbtn svg { width:24px; height:24px; }
.navbtn .lbl { font-family:var(--font-body); font-size:10px; font-weight:500; }
.navbtn .ico, .navbtn .lbl { color:rgba(255,255,255,0.6); }
.navbtn.on .ico, .navbtn.on .lbl { color:var(--nr-red); }

/* ═══════════════════════════════════════════════
   SCREENS
   ═══════════════════════════════════════════════ */
.screen { position:absolute; inset:0; display:none; flex-direction:column; background:var(--nr-black); }
.screen.on { display:flex; }

/* ═══════════════════════════════════════════════
   TODAY — TikTok-style vertical snap scroll
   ═══════════════════════════════════════════════ */
.today-header {
  position:absolute; top:var(--safe-top); left:0; right:0; z-index:10; padding:0 16px;
  display:flex; flex-direction:column;
}
.today-top-row {
  display:flex; align-items:center; justify-content:space-between;
  height:40px;
}
.today-logo {
  font-family:var(--font-headline); font-size:22px; color:var(--nr-white);
  letter-spacing:-0.3px;
}
.today-right {
  display:flex; align-items:center; gap:10px;
}
.today-date {
  font-family:var(--font-mono); font-size:11px; font-weight:500;
  color:var(--nr-smoke); text-transform:uppercase; letter-spacing:1px;
}
.today-progress {
  width:26px; height:26px; position:relative;
}
.today-progress svg { width:100%; height:100%; }
.today-tabs {
  display:flex; gap:20px; height:34px; align-items:center;
}
.today-tab {
  font-family:var(--font-body); font-size:15px; font-weight:500;
  color:rgba(255,255,255,0.45); background:none; border:none;
  cursor:pointer; padding:4px 0; position:relative;
  letter-spacing:-0.2px;
}
.today-tab.active {
  color:var(--nr-red); font-weight:600;
}
.today-tab.active::after {
  content:''; position:absolute; bottom:0; left:0; right:0;
  height:2px; background:var(--nr-red); border-radius:1px;
}

/* Vertical snap container */
.feed-snap {
  position:absolute;
  top: calc(var(--safe-top) + 78px);
  bottom: var(--nav-h);
  left:0; right:0;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  -webkit-overflow-scrolling: touch;
}
.feed-snap::-webkit-scrollbar { display:none; }

/* Each story = one full "page" */
.feed-page {
  scroll-snap-align: start;
  height: 100%;
  min-height: 100%;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* Image + side actions layout */
.card-content-row {
  display:flex; gap:0; padding:4px 0 0 16px; flex:1 1 0; min-height:0;
  max-height:55%; overflow:hidden;
}

/* Main image area — swipeable slide track */
.card-img-wrap {
  position:relative;
  flex:1;
  overflow: hidden;
  background: var(--nr-lead);
  border-radius: 12px;
  touch-action: pan-y;
}
.card-slide-track {
  display:flex; height:100%;
  transition:transform 0.3s cubic-bezier(0.2,0,0.2,1);
}
.card-slide-track img {
  height:100%; object-fit:cover; flex:0 0 auto;
  -webkit-user-drag:none; user-select:none; pointer-events:none;
}
.card-img-credit {
  position:absolute; bottom:8px; right:10px;
  font-family:var(--font-mono); font-size:9px; font-weight:500;
  color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:0.5px;
  z-index:2; pointer-events:none;
}
.card-expand-btn {
  position:absolute; top:10px; right:10px; width:32px; height:32px;
  background:rgba(0,0,0,0.4); backdrop-filter:blur(6px);
  border:none; border-radius:8px; display:flex; align-items:center;
  justify-content:center; cursor:pointer; z-index:2;
}
.card-expand-btn svg { width:16px; height:16px; color:var(--nr-white); }

/* Side action icons — outside image, right column */
.card-actions {
  display:flex; flex-direction:column; gap:6px;
  padding:0 6px; justify-content:flex-end; padding-bottom:12px;
  flex-shrink:0;
}
.card-action {
  width:42px; height:42px; border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  border:none; background:rgba(255,255,255,0.08);
  cursor:pointer; transition:transform 0.1s ease-out, background 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.card-action:active { transform:scale(0.85); background:rgba(255,255,255,0.15); }
.card-action svg { width:20px; height:20px; color:var(--nr-white); opacity:0.9; }
.card-action.bookmarked svg { color:var(--nr-red); fill:var(--nr-red); opacity:1; }

/* Dots pagination */
.card-dots {
  display:flex; gap:5px; padding:8px 16px 4px; justify-content:center;
  flex-shrink:0;
}
.card-dot {
  width:6px; height:6px; border-radius:50%;
  background:rgba(255,255,255,0.25);
}
.card-dot.active { background:var(--nr-red); }

/* Author + tag pills below dots */
.card-pills {
  display:flex; gap:8px; padding:4px 16px 6px; align-items:center;
  flex-shrink:0;
}
.card-pill {
  display:flex; align-items:center; gap:5px; height:28px;
  padding:0 10px; border-radius:20px;
  background:var(--nr-lead);
  font-family:var(--font-body); font-size:12px; font-weight:500;
  color:var(--nr-smoke); letter-spacing:-0.2px;
}
.card-pill-av {
  width:18px; height:18px; border-radius:50%;
  background:linear-gradient(135deg,var(--nr-red),var(--nr-yellow));
  display:flex; align-items:center; justify-content:center;
  font-size:7px; font-weight:600; color:var(--nr-white); flex-shrink:0;
}

/* Headline area */
.card-headline {
  font-family:var(--font-headline); font-size:22px; font-weight:normal;
  line-height:1.2; color:var(--nr-white); padding:4px 16px 2px;
  flex-shrink:0;
}
.card-sub {
  font-family:var(--font-body); font-size:15px; font-weight:400;
  line-height:1.35; color:var(--nr-silver); padding:0 16px 8px;
  flex-shrink:0;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical;
  overflow:hidden;
}

/* ═══════════════════════════════════════════════
   STORY CAROUSEL — Opens when you tap expand
   ═══════════════════════════════════════════════ */
.carousel {
  position:fixed; inset:0; width:393px; height:852px; left:50%; transform:translateX(-50%);
  background:var(--nr-black); z-index:2000; display:none; flex-direction:column;
  opacity:0;
}
.carousel.on { display:flex; animation:overlayIn 0.3s cubic-bezier(0.2,0,0.2,1) forwards; }
@keyframes overlayIn { from { opacity:0; } to { opacity:1; } }
.car-top { display:flex; align-items:center; padding:56px 16px 8px; gap:10px; }
.car-back { width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; }
.car-back svg { width:22px; height:22px; color:var(--nr-white); }
.car-dots { display:flex; gap:5px; flex:1; justify-content:center; }
.car-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.2); }
.car-dot.on { background:var(--nr-red); }

.car-body { flex:1; position:relative; overflow:hidden; touch-action:none; user-select:none; cursor:grab; }
.car-body:active { cursor:grabbing; }
.car-nav { position:absolute; top:50%; transform:translateY(-50%); width:44px; height:44px; background:rgba(0,0,0,0.5); backdrop-filter:blur(6px); border:none; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; z-index:10; transition:opacity 0.2s; }
.car-nav:hover { background:rgba(0,0,0,0.7); }
.car-nav svg { width:22px; height:22px; color:var(--nr-white); }
.car-nav.l { left:10px; }
.car-nav.r { right:10px; }
.car-track { display:flex; height:100%; transition:transform 0.35s cubic-bezier(0.2,0,0.2,1); }
.car-slide { min-width:393px; height:100%; position:relative; display:flex; flex-direction:column; }
.car-slide-img { width:100%; height:45%; object-fit:cover; }
.car-slide-fade { position:absolute; top:38%; left:0; right:0; bottom:0; background:linear-gradient(to bottom, transparent 0%, var(--nr-black) 35%); }
.car-slide-credit { position:absolute; top:8px; left:50%; transform:translateX(-50%); font-size:10px; color:rgba(255,255,255,0.45); letter-spacing:0.3px; }
.car-slide-card {
  position:absolute; bottom:90px; left:16px; right:72px;
  background:rgba(31,31,31,0.82); backdrop-filter:blur(10px);
  border-radius:var(--radius); padding:14px 18px;
}
.car-slide-label { font-family:var(--font-headline); font-size:17px; color:var(--nr-white); margin-bottom:6px; }
.car-slide-body { font-size:14px; line-height:1.5; color:var(--nr-smoke); }
.car-slide-actions {
  position:absolute; right:12px; bottom:120px;
  display:flex; flex-direction:column; gap:14px;
}
.car-abtn { width:40px; height:40px; display:flex; align-items:center; justify-content:center; background:none; border:none; cursor:pointer; }
.car-abtn svg { width:22px; height:22px; color:var(--nr-white); }
.car-abtn-source {
  width:auto; height:auto; gap:5px; padding:8px 14px 8px 11px;
  background:rgba(255,99,67,0.15); border:1px solid rgba(255,99,67,0.3);
  border-radius:100px; transition:background 0.15s ease;
}
.car-abtn-source:hover { background:rgba(255,99,67,0.25); }
.car-abtn-source:active { transform:scale(0.95); }
.car-abtn-source svg { width:16px; height:16px; color:var(--nr-red); }
.car-abtn-source span {
  font-family:var(--font-mono); font-size:11px; font-weight:500;
  color:var(--nr-red); text-transform:uppercase; letter-spacing:0.5px;
}
.car-journalist {
  position:absolute; bottom:40px; left:16px;
  display:flex; align-items:center; gap:10px;
}
.car-j-av { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,var(--nr-red),var(--nr-yellow)); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:var(--nr-white); }
.car-j-name { font-size:14px; font-weight:500; color:var(--nr-white); }

/* ═══════════════════════════════════════════════
   POLL
   ═══════════════════════════════════════════════ */
.poll {
  position:fixed; inset:0; width:393px; height:852px; left:50%; transform:translateX(-50%);
  background:var(--nr-black); z-index:3000; display:none; flex-direction:column;
  align-items:center; justify-content:center; padding:40px 24px;
  opacity:0;
}
.poll.on { display:flex; animation:overlayIn 0.3s cubic-bezier(0.2,0,0.2,1) forwards; }
.poll-x { position:absolute; top:56px; right:20px; background:none; border:none; color:var(--nr-white); font-size:26px; cursor:pointer; }
.poll-h { font-family:var(--font-headline); font-size:40px; color:var(--nr-white); text-align:center; margin-bottom:16px; }
.poll-q { font-size:15px; color:var(--nr-smoke); text-align:center; line-height:1.5; margin-bottom:40px; max-width:310px; }
.poll-box { width:100%; background:var(--nr-lead); border-radius:var(--radius); padding:18px; }
.poll-track { position:relative; height:3px; background:var(--nr-yellow); border-radius:2px; margin:10px 0 14px; }
.poll-ticks { display:flex; justify-content:space-between; position:absolute; top:-4px; left:0; right:0; pointer-events:none; }
.poll-tick { width:2px; height:11px; background:var(--nr-yellow); border-radius:1px; opacity:0.5; }
.poll-thumb { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:18px; height:18px; background:var(--nr-yellow); border-radius:50%; cursor:grab; transition:left 0.2s; }
.poll-labels { display:flex; justify-content:space-between; }
.poll-lbl { font-size:10px; color:var(--nr-white); text-align:center; cursor:pointer; flex:1; padding:4px 0; transition:color 0.2s; }
.poll-lbl.sel { color:var(--nr-yellow); font-weight:600; }
.poll-note { margin-top:20px; font-size:12px; color:var(--nr-ash); text-align:center; }
.poll-link { margin-top:10px; font-size:12px; color:var(--nr-yellow); text-decoration:underline; text-underline-offset:3px; cursor:pointer; text-align:center; }

/* ═══════════════════════════════════════════════
   XP REWARD
   ═══════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════
   XP REWARD — Clean, minimal reward screen
   ═══════════════════════════════════════════════ */
.xp {
  position:fixed; inset:0; width:393px; height:852px; left:50%; transform:translateX(-50%);
  background:var(--nr-black); z-index:3000; display:none; flex-direction:column;
  align-items:center; justify-content:center; padding:0 28px;
  opacity:0;
}
.xp.on { display:flex; animation:xpFadeIn 0.25s cubic-bezier(0.2,0,0.2,1) forwards; }
@keyframes xpFadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes xpPop { from { opacity:0; transform:scale(0.5); } 60% { transform:scale(1.1); } to { opacity:1; transform:scale(1); } }
@keyframes xpSlideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
.xp-fire { font-size:48px; margin-bottom:6px; animation:xpPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) 0.1s both; }
.xp-title { font-family:var(--font-headline); font-size:24px; color:var(--nr-white); margin-bottom:6px; animation:xpSlideUp 0.4s cubic-bezier(0.2,0,0.2,1) 0.2s both; }
.xp-subtitle { font-size:14px; color:var(--nr-ash); margin-bottom:32px; animation:xpSlideUp 0.4s cubic-bezier(0.2,0,0.2,1) 0.25s both; }
.xp-cards { display:none; }
.xp-ring { display:none; }
.xp-ring svg { width:100%; height:100%; }
.xp-ring-c { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; }
.xp-ring-l { font-family:var(--font-headline); font-size:20px; color:var(--nr-white); }
.xp-ring-p { font-size:12px; color:var(--nr-ash); }
.xp-card-lbl, .xp-card-val, .xp-card { display:none; }
#readMoreArea { width:100%; animation:xpSlideUp 0.4s cubic-bezier(0.2,0,0.2,1) 0.35s both; }
.xp-btn {
  width:100%; padding:16px; background:var(--nr-red); border:none; border-radius:var(--radius);
  color:var(--nr-white); font-family:var(--font-mono); font-size:14px; font-weight:500;
  text-transform:uppercase; letter-spacing:1px; cursor:pointer; margin-top:20px;
  transition:transform 0.1s ease-out, opacity 0.1s ease-out;
  animation:xpSlideUp 0.4s cubic-bezier(0.2,0,0.2,1) 0.4s both;
}
.xp-btn:active { opacity:0.9; transform:scale(0.97); }

/* Continue reading card inside XP screen */
.readmore-divider {
  font-family:var(--font-body); font-size:13px; font-weight:500;
  color:var(--nr-ash); text-transform:uppercase; letter-spacing:0.5px;
  text-align:center; margin-bottom:12px;
}
.readmore-card {
  width:100%; background:var(--nr-lead); border-radius:var(--radius);
  padding:14px 16px; cursor:pointer;
  transition:background 0.15s ease;
}
.readmore-card:active { background:var(--nr-iron); }
.readmore-label {
  font-family:var(--font-mono); font-size:10px; font-weight:500;
  color:var(--nr-ash); text-transform:uppercase; letter-spacing:0.8px;
  margin-bottom:8px;
}
.readmore-row {
  display:flex; align-items:center; gap:12px;
}
.readmore-favicon {
  width:36px; height:36px; border-radius:var(--radius-sm);
  background:var(--nr-iron); display:flex; align-items:center;
  justify-content:center; font-size:18px; flex-shrink:0;
}
.readmore-info { flex:1; min-width:0; }
.readmore-title {
  font-family:var(--font-body); font-size:14px; font-weight:600;
  color:var(--nr-white); line-height:1.3;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.readmore-source {
  font-family:var(--font-body); font-size:12px; color:var(--nr-ash);
  margin-top:2px;
}
.readmore-arrow {
  width:24px; height:24px; display:flex; align-items:center;
  justify-content:center; flex-shrink:0;
}
.readmore-arrow svg { width:16px; height:16px; color:var(--nr-steel); }

/* ═══════════════════════════════════════════════
   EXPLORE
   ═══════════════════════════════════════════════ */
.explore-search { margin:12px 20px; display:flex; align-items:center; gap:10px; background:var(--nr-lead); border-radius:var(--radius); padding:10px 14px; }
.explore-search svg { width:18px; height:18px; color:var(--nr-ash); flex-shrink:0; }
.explore-search input { background:none; border:none; color:var(--nr-white); font-family:var(--font-body); font-size:15px; width:100%; outline:none; }
.explore-search input::placeholder { color:var(--nr-ash); }
.cal-head { display:flex; align-items:center; justify-content:space-between; padding:6px 20px; }
.cal-arr { background:none; border:none; color:var(--nr-white); font-size:18px; cursor:pointer; padding:4px 8px; }
.cal-month { font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--nr-white); }
.cal-wk { display:grid; grid-template-columns:repeat(5,1fr); padding:6px 20px; gap:6px; }
.cal-wk-lbl { text-align:center; font-size:11px; font-weight:500; color:var(--nr-ash); }
.cal-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; padding:4px 20px 14px; }
.cal-day { aspect-ratio:1; border-radius:var(--radius); background:var(--nr-lead); position:relative; overflow:hidden; cursor:pointer; }
.cal-day img { width:100%; height:100%; object-fit:cover; opacity:0.7; }
.cal-day-n { position:absolute; top:3px; left:5px; font-size:14px; font-weight:600; color:var(--nr-white); text-shadow:0 1px 3px rgba(0,0,0,0.7); }
.exp-date { font-size:15px; font-weight:500; color:var(--nr-white); padding:6px 20px; }
.exp-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:4px 20px 20px; }
.exp-thumb { aspect-ratio:4/5; border-radius:var(--radius); overflow:hidden; position:relative; background:var(--nr-lead); cursor:pointer; }
.exp-thumb img { width:100%; height:100%; object-fit:cover; }
.exp-check { position:absolute; top:7px; right:7px; width:20px; height:20px; background:var(--nr-green); border-radius:50%; display:flex; align-items:center; justify-content:center; }

        <div class="card-img-wrap" id="imgWrap-${i}" data-slide="0" data-total="${s.slides.length}">
          <div class="card-slide-track" id="slideTrack-${i}">
            ${s.slides.map(sl => `<img src="${sl.img}" alt="">`).join('')}
          </div>
          <div class="card-img-credit" id="imgCredit-${i}">@${s.slides[0].credit}</div>
          <button class="card-expand-btn" onclick="event.stopPropagation();openCarousel(${i})">${ICONS.expand}</button>
        </div>
        <div class="card-actions">
          <button class="card-action" onclick="event.stopPropagation();openBrowserFor(${i})" title="Read"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></button>
          <button class="card-action" onclick="event.stopPropagation();openCarousel(${i})" title="Quiz"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></button>
          <button class="card-action" onclick="event.stopPropagation();openPoll(${i})" title="Poll">${ICONS.poll}</button>
          <button class="card-action" id="bm-${i}" onclick="event.stopPropagation();toggleBookmark(this)" title="Bookmark">${ICONS.bookmark}</button>
          <button class="card-action" onclick="event.stopPropagation();shareStory(${i})" title="Share">${ICONS.share}</button>
        </div>
      </div>
      <div class="card-dots" id="cardDots-${i}">
        ${s.slides.map((_, j) => `<div class="card-dot${j === 0 ? ' active' : ''}"></div>`).join('')}
      </div>
      <div class="card-pills">
        <div class="card-pill"><div class="card-pill-av">${s.author.initials}</div>${s.author.name}</div>
        ${s.tag ? `<div class="card-pill">${s.tag}</div>` : ''}
      </div>
      <div class="card-headline">${s.headline}</div>
      <div class="card-sub">${s.subtitle}</div>
    </div>
  `).join('');

  // Size slide images to match wrap width, then wire up swipe
  STORIES.forEach((s, i) => {
    const wrap = document.getElementById('imgWrap-' + i);
    if (!wrap) return;
    const imgs = wrap.querySelectorAll('.card-slide-track img');
    const setWidths = () => {
      const w = wrap.offsetWidth;
      imgs.forEach(img => { img.style.width = w + 'px'; });
    };
    // Set widths after layout
    requestAnimationFrame(setWidths);
    window.addEventListener('resize', setWidths);
    let startX = 0, dragging = false;

    wrap.addEventListener('touchstart', (e) => {
      dragging = true;
      startX = e.touches[0].clientX;
    }, {passive: true});

    wrap.addEventListener('mousedown', (e) => {
      dragging = true;
      startX = e.clientX;
      e.preventDefault();
    });

    wrap.addEventListener('touchend', (e) => {
      if (!dragging) return;
      dragging = false;
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 30) feedSlide(i, diff > 0 ? 1 : -1);
    });

    document.addEventListener('mouseup', (e) => {
      if (!dragging) return;
      dragging = false;
      const diff = startX - e.clientX;
      if (Math.abs(diff) > 30) feedSlide(i, diff > 0 ? 1 : -1);
    });

    // Tap on image (not swipe) opens carousel at current slide
    wrap.addEventListener('click', () => {
      if (!dragging) {
        const cur = parseInt(wrap.dataset.slide) || 0;
        openCarousel(i, cur);
      }
    });
  });
}

function feedSlide(storyIdx, dir) {
  const wrap = document.getElementById('imgWrap-' + storyIdx);
  const track = document.getElementById('slideTrack-' + storyIdx);
  const dots = document.getElementById('cardDots-' + storyIdx);
  const credit = document.getElementById('imgCredit-' + storyIdx);
  if (!wrap || !track) return;

  const total = parseInt(wrap.dataset.total);
  let cur = parseInt(wrap.dataset.slide) || 0;
  const next = cur + dir;
  if (next < 0 || next >= total) return;

  const wrapW = wrap.offsetWidth;
  wrap.dataset.slide = next;
  track.style.transform = 'translateX(-' + (next * wrapW) + 'px)';

  // Update dots
  if (dots) {
    dots.querySelectorAll('.card-dot').forEach((d, j) => {
      d.classList.toggle('active', j === next);
    });
  }

  // Update credit
  if (credit) {
    credit.textContent = '@' + STORIES[storyIdx].slides[next].credit;
  }
}

   STORY CAROUSEL
   ═══════════════════════════════════════════════ */
let carSlide = 0;
let carTotal = 0;
let carTouchX = 0;
let carDragging = false;

function openCarousel(idx, startSlide) {
  const story = STORIES[idx];
  currentStoryIdx = idx;
  carSlide = startSlide || 0;
  carTotal = story.slides.length + 2; // +poll +xp
  const el = document.getElementById('carousel');
  el.innerHTML = `
    <div class="car-top">
      <button class="car-back" onclick="closeCarousel()">${ICONS.chevLeft}</button>
      <div class="car-dots">${Array.from({length:carTotal},(_,i)=>`<div class="car-dot${i===carSlide?' on':''}"></div>`).join('')}</div>
    </div>
    <div class="car-body" id="carBody">
      <button class="car-nav l" id="carPrev" onclick="carGo(-1)">${ICONS.chevLeft}</button>
      <button class="car-nav r" id="carNext" onclick="carGo(1)">${ICONS.chevRight}</button>
      <div class="car-track" id="carTrack">
        ${story.slides.map(s=>`
        <div class="car-slide">
          <img class="car-slide-img" src="${s.img}">
          <div class="car-slide-fade"></div>
          <div class="car-slide-credit">${s.credit}</div>
          <div class="car-slide-card">${s.label?`<div class="car-slide-label">${s.label}</div>`:''}
            <div class="car-slide-body">${s.text}</div>
          </div>
          <div class="car-slide-actions">
            <button class="car-abtn">${ICONS.audio}</button>
            <button class="car-abtn">${ICONS.cc}</button>
            <button class="car-abtn">${ICONS.share}</button>
            ${story.readMore && story.readMore.url ? `<button class="car-abtn car-abtn-source" onclick="event.stopPropagation();openBrowserFor(${idx})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg><span>Read</span></button>` : ''}
          </div>
          <div class="car-journalist"><div class="car-j-av">${story.author.initials}</div><span class="car-j-name">${story.author.name}</span></div>
        </div>`).join('')}
        <div class="car-slide" style="align-items:center;justify-content:center;cursor:pointer" onclick="openPoll(${idx})">
          <div style="text-align:center;padding:40px"><div style="font-family:var(--font-headline);font-size:30px;color:var(--nr-white);margin-bottom:10px">Where do you stand?</div><div style="color:var(--nr-ash);font-size:14px">Tap to share your opinion</div></div>
        </div>
        <div class="car-slide" style="align-items:center;justify-content:center;cursor:pointer" onclick="openXP()">
          <div style="text-align:center;padding:40px"><div style="font-size:44px;margin-bottom:6px">🔥</div><div style="font-family:var(--font-headline);font-size:26px;color:var(--nr-white);margin-bottom:6px">Claim your XP!</div><div style="color:var(--nr-ash);font-size:14px">Tap to see your reward</div></div>
        </div>
      </div>
    </div>
  `;
  el.classList.add('on');

  // Jump to starting slide if provided
  if (carSlide > 0) {
    requestAnimationFrame(() => {
      document.getElementById('carTrack').style.transform = `translateX(-${carSlide*393}px)`;
    });
  }

  // Swipe handling — supports touch, mouse, and pointer events
  const body = document.getElementById('carBody');

  function onStart(e) {
    carDragging = true;
    const pt = e.touches ? e.touches[0] : e;
    carTouchX = pt.clientX;
    e.preventDefault();
  }
  function onEnd(e) {
    if (!carDragging) return;
    carDragging = false;
    const pt = e.changedTouches ? e.changedTouches[0] : e;
    const diff = carTouchX - pt.clientX;
    if (Math.abs(diff) > 30) {
      carGo(diff > 0 ? 1 : -1);
    }
  }

  body.addEventListener('mousedown', onStart);
  body.addEventListener('touchstart', onStart, {passive:false});
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);

  // Keyboard navigation
  el._keyHandler = (e) => {
    if (e.key === 'ArrowRight') carGo(1);
    else if (e.key === 'ArrowLeft') carGo(-1);
    else if (e.key === 'Escape') closeCarousel();
  };
  document.addEventListener('keydown', el._keyHandler);

  updateCarNav();
}

function carGo(dir) {
  const next = carSlide + dir;
  if (next >= 0 && next < carTotal) {
    carSlide = next;
    updateCar();
  }
}
function updateCar() {
  document.getElementById('carTrack').style.transform = `translateX(-${carSlide*393}px)`;
  document.querySelectorAll('#carousel .car-dot').forEach((d,i) => d.classList.toggle('on', i===carSlide));
  updateCarNav();
}
function updateCarNav() {
  const prev = document.getElementById('carPrev');
  const next = document.getElementById('carNext');
  if (prev) prev.style.opacity = carSlide === 0 ? '0' : '1';
  if (prev) prev.style.pointerEvents = carSlide === 0 ? 'none' : 'auto';
  if (next) next.style.opacity = carSlide === carTotal-1 ? '0' : '1';
  if (next) next.style.pointerEvents = carSlide === carTotal-1 ? 'none' : 'auto';
}
function closeCarousel() {
  const el = document.getElementById('carousel');
  el.classList.remove('on');
  if (el._keyHandler) document.removeEventListener('keydown', el._keyHandler);
}

   ═══════════════════════════════════════════════ */
function toggleBookmark(btn) {
  btn.classList.toggle('bookmarked');
}

function shareStory(idx) {
  const story = STORIES[idx];
  if (navigator.share) {
    navigator.share({ title: story.headline, text: story.subtitle || story.headline, url: window.location.href });
  } else {
    // Fallback: copy to clipboard visual feedback
    const btn = document.querySelector(`#bm-${idx}`).parentElement.lastElementChild;
    btn.style.background = 'rgba(255,99,67,0.2)';
    setTimeout(() => { btn.style.background = ''; }, 600);
  }
}
